# Dev profile — all downstream services in Docker Compose; IntelliJ uses localhost defaults.
# Docker Compose injects: KEYCLOAK_HOST=keycloak, KEYCLOAK_TOKEN_URI, RETAIL_EXPERIENCE_ENDPOINTS_*

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/certs

retail:
  experience:
    keycloak:
      token-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/token
    endpoints:
      # Docker Compose overrides these via RETAIL_EXPERIENCE_ENDPOINTS_* env vars.
      # IntelliJ: each service runs on its mapped localhost port.
      catalog: ${RETAIL_EXPERIENCE_ENDPOINTS_CATALOG:http://localhost:8081}
      carts:   ${RETAIL_EXPERIENCE_ENDPOINTS_CARTS:http://localhost:8082}
      orders:  ${RETAIL_EXPERIENCE_ENDPOINTS_ORDERS:http://localhost:8084}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

logging:
  level:
    com.retailstore: DEBUG
    reactor.netty: INFO

server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: catalog-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/retailstore/protocol/openid-connect/certs}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:h2:mem:catalogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_batch_fetch_size: 20
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.retailstore: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} — %msg%n"

retail:
  catalog:
    persistence:
      provider: ${RETAIL_CATALOG_PERSISTENCE_PROVIDER:in-memory}
      endpoint: ${RETAIL_CATALOG_PERSISTENCE_ENDPOINT:}
      db-name: ${RETAIL_CATALOG_PERSISTENCE_DB_NAME:catalogdb}
      user: ${RETAIL_CATALOG_PERSISTENCE_USER:catalog_user}
      password: ${RETAIL_CATALOG_PERSISTENCE_PASSWORD:}

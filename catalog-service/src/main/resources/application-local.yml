# Local profile — runs on Docker Desktop k8s (local machine).
# Helm injects MYSQL_HOST=mysql, KEYCLOAK_HOST=keycloak, REDIS_HOST=redis-master, ZIPKIN_HOST=zipkin
# IntelliJ: port-forward.sh active; ${VAR:localhost} defaults resolve to forwarded ports.

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/catalogdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:catalog_user}
    password: ${MYSQL_PASSWORD:catalog_pass}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/certs
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

retail:
  catalog:
    persistence:
      provider: jpa

logging:
  level:
    com.retailstore: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

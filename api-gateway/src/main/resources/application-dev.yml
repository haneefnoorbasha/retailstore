# Dev profile — infra runs on k3s (EC2). Start with: ./retailstore-platform/scripts/start-dev.sh
# IntelliJ: set SPRING_PROFILES_ACTIVE=dev; run port-forward.sh first; ${VAR:localhost} defaults
#   resolve to the forwarded k3s ports (Keycloak→8180, Redis→6379, etc.)
# k3s pods: helm/dev/gateway.yaml injects KEYCLOAK_HOST=keycloak, REDIS_HOST=redis-master, etc.
#
# Gateway route URIs (RETAIL_GATEWAY_ROUTES_*):
#   IntelliJ: set RETAIL_GATEWAY_ROUTES_CATALOG=http://localhost:8081, etc. (other services in k3s)
#   k3s pods: helm/dev/gateway.yaml already injects http://catalog:8080, etc.

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/certs

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

logging:
  level:
    com.retailstore: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO

# Local profile — runs on Docker Desktop k8s (local machine).
# Helm injects REDIS_HOST=redis-master, KEYCLOAK_HOST=keycloak
# IntelliJ: port-forward.sh active; ${VAR:localhost} defaults resolve to forwarded ports.

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/certs
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

retail:
  checkout:
    keycloak:
      token-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/token

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

logging:
  level:
    com.retailstore: DEBUG

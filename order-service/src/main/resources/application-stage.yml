# Stage profile — AWS RDS MySQL + AWS SQS + EKS Keycloak.
# All ${...} variables must be injected via Kubernetes Secrets / AWS Parameter Store.

spring:
  datasource:
    # Replace: RDS MySQL endpoint (e.g. stage-orders.xxxxxx.us-east-1.rds.amazonaws.com)
    url: jdbc:mysql://${RDS_ENDPOINT}:${RDS_PORT:3306}/ordersdb?useSSL=true&requireSSL=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RDS_USER}
    password: ${RDS_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Replace: Keycloak JWKS URI on EKS
          jwk-set-uri: ${KEYCLOAK_JWKS_URI}

retail:
  order:
    messaging:
      enabled: true
      sqs:
        # Replace: AWS SQS queue URL (e.g. https://sqs.us-east-1.amazonaws.com/123456789012/order-events-stage)
        queue-url: ${RETAIL_ORDER_MESSAGING_SQS_QUEUE_URL}

management:
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      # Replace: tracing backend endpoint
      endpoint: ${TRACING_ENDPOINT:https://zipkin.internal.retailstore.com/api/v2/spans}
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.retailstore: INFO
    org.hibernate.SQL: WARN

# Stage profile — AWS RDS MySQL + AWS MSK Kafka + EKS Keycloak.
# All ${...} variables injected via Helm values → Kubernetes env vars.

spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:${RDS_PORT:3306}/ordersdb?useSSL=true&requireSSL=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RDS_USER}
    password: ${RDS_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI}
  kafka:
    # Replace: MSK bootstrap servers (e.g. b-1.xxx.kafka.us-east-1.amazonaws.com:9094)
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SSL
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

retail:
  order:
    messaging:
      enabled: true
      kafka:
        topic: order-events-stage

management:
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${TRACING_ENDPOINT:https://zipkin.internal.retailstore.com/api/v2/spans}
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.retailstore: INFO
    org.hibernate.SQL: WARN

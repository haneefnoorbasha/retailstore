# Dev profile — MySQL + LocalStack SQS in Docker Compose; IntelliJ uses localhost defaults.
# Docker Compose injects: MYSQL_HOST=mysql, SQS_ENDPOINT=http://localstack:4566, KEYCLOAK_HOST=keycloak

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ordersdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:orders_user}
    password: ${MYSQL_PASSWORD:orders_pass}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/certs

retail:
  order:
    messaging:
      enabled: true
      sqs:
        # LocalStack: Docker Compose sets the full URL; IntelliJ defaults to localhost port mapping
        queue-url: ${RETAIL_ORDER_MESSAGING_SQS_QUEUE_URL:http://localhost:4566/000000000000/order-events-dev}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

logging:
  level:
    com.retailstore: DEBUG
    org.hibernate.SQL: DEBUG

# Local profile — Docker Desktop K8s, docker-compose, and IntelliJ.
# K8s/docker-compose: KAFKA_BOOTSTRAP_SERVERS injected as env var (kafka:9092).
# IntelliJ against docker-compose: use localhost:9094 (external listener) — set KAFKA_BOOTSTRAP_SERVERS=localhost:9094.
# IntelliJ against K8s: Kafka not port-forwardable; set RETAIL_ORDER_MESSAGING_ENABLED=false to run without messaging.

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ordersdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:orders_user}
    password: ${MYSQL_PASSWORD:orders_pass}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

retail:
  order:
    messaging:
      enabled: true
      kafka:
        topic: order-events-local

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

logging:
  level:
    com.retailstore: DEBUG
    org.hibernate.SQL: DEBUG

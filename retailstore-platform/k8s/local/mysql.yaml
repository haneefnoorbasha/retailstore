apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: retailstore
type: Opaque
stringData:
  root-password: "rootpass"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: retailstore
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS catalogdb  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS ordersdb   CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS keycloakdb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    CREATE USER IF NOT EXISTS 'catalog_user'@'%'  IDENTIFIED BY 'catalog_pass';
    CREATE USER IF NOT EXISTS 'orders_user'@'%'   IDENTIFIED BY 'orders_pass';
    CREATE USER IF NOT EXISTS 'keycloak_user'@'%' IDENTIFIED BY 'keycloak_pass';

    GRANT ALL PRIVILEGES ON catalogdb.*  TO 'catalog_user'@'%';
    GRANT ALL PRIVILEGES ON ordersdb.*   TO 'orders_user'@'%';
    GRANT ALL PRIVILEGES ON keycloakdb.* TO 'keycloak_user'@'%';

    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: retailstore
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 150m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-u", "root", "-prootpass"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: mysql-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: retailstore
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None

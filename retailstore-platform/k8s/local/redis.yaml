apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: retailstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args: ["--save", ""]
          ports:
            - containerPort: 6379
          resources:
            limits:
              memory: 192Mi
            requests:
              cpu: 50m
              memory: 64Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: retailstore
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

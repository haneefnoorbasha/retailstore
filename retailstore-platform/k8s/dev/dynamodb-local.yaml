apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-local
  namespace: retailstore
  labels:
    app: dynamodb-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamodb-local
  template:
    metadata:
      labels:
        app: dynamodb-local
    spec:
      containers:
        - name: dynamodb-local
          image: amazon/dynamodb-local:2.5.2
          args: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
          ports:
            - containerPort: 8000
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb-local
  namespace: retailstore
  labels:
    app: dynamodb-local
spec:
  type: ClusterIP
  selector:
    app: dynamodb-local
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
# Job: create the Carts table after DynamoDB Local is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: dynamodb-init
  namespace: retailstore
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-dynamodb
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              until curl -sf http://dynamodb-local:8000/shell/ > /dev/null 2>&1; do
                echo "waiting for dynamodb-local..."; sleep 3
              done
      containers:
        - name: create-table
          image: amazon/aws-cli:2.17.0
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "dummy"
            - name: AWS_SECRET_ACCESS_KEY
              value: "dummy"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          command:
            - /bin/sh
            - -c
            - |
              aws dynamodb create-table \
                --table-name Carts \
                --attribute-definitions AttributeName=customerId,AttributeType=S \
                --key-schema AttributeName=customerId,KeyType=HASH \
                --billing-mode PAY_PER_REQUEST \
                --endpoint-url http://dynamodb-local:8000 || true
              echo "DynamoDB table ready"

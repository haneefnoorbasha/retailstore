# RetailStore — Local environment (docker-compose)
# Profile: local  →  SPRING_PROFILES_ACTIVE=local injected into every service
#
# Two usage modes:
#   Full stack  : docker compose up --build          (all services + infra)
#   One service in IntelliJ: docker compose up --no-deps catalog carts ...
#                            then stop the one service you want to debug and run it in IntelliJ
#                            with SPRING_PROFILES_ACTIVE=local
#
# Local replicates stage technology stack:
#   stage  →  RDS MySQL  | ElastiCache Redis | DynamoDB AWS | MSK Kafka | Keycloak EKS
#   local  →  MySQL 8.4  | Redis 7           | DynamoDB Local | Kafka (KRaft) | Keycloak Docker

networks:
  retailstore:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  dynamodb-data:
  keycloak-data:
  prometheus-data:
  grafana-data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports: ["3306:3306"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [retailstore]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    networks: [retailstore]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: dynamodb-local
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports: ["8000:8000"]
    networks: [retailstore]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dynamodb-init:
    image: amazon/aws-cli:2.17.0
    container_name: dynamodb-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: us-east-1
    command: >
      dynamodb create-table
      --table-name Carts
      --attribute-definitions AttributeName=customerId,AttributeType=S
      --key-schema AttributeName=customerId,KeyType=HASH
      --billing-mode PAY_PER_REQUEST
      --endpoint-url http://dynamodb-local:8000
    networks: [retailstore]

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      # PLAINTEXT_INTERNAL → container-to-container (kafka:9092)
      # PLAINTEXT_EXTERNAL → IntelliJ on host (localhost:9094)
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://:9092,PLAINTEXT_EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:9092,PLAINTEXT_EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    ports:
      - "9092:9092"   # internal (container-to-container)
      - "9094:9094"   # external (IntelliJ → localhost:9094)
    networks: [retailstore]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      # Use MySQL so dev matches stage (where Keycloak uses RDS)
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloakdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_pass
    ports: ["8180:8180"]
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - keycloak-data:/opt/keycloak/data
    networks: [retailstore]
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8180/realms/retailstore/.well-known/openid-configuration || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports: ["9411:9411"]
    networks: [retailstore]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    networks: [retailstore]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=7d"]

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports: ["3001:3000"]
    volumes: [grafana-data:/var/lib/grafana]
    networks: [retailstore]
    depends_on: [prometheus]

  # ── Domain Services ─────────────────────────────────────────────────────────

  catalog:
    build:
      context: ../catalog-service
      dockerfile: Dockerfile
    container_name: catalog
    environment:
      SPRING_PROFILES_ACTIVE: local
      MYSQL_HOST: mysql
      MYSQL_USER: catalog_user
      MYSQL_PASSWORD: catalog_pass
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "8180"
      ZIPKIN_HOST: zipkin
      RETAIL_CATALOG_PERSISTENCE_PROVIDER: jpa
    ports: ["8081:8080"]
    networks: [retailstore]
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  carts:
    build:
      context: ../cart-service
      dockerfile: Dockerfile
    container_name: carts
    environment:
      SPRING_PROFILES_ACTIVE: local
      RETAIL_CART_DYNAMODB_TABLE_NAME: Carts
      RETAIL_CART_DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: us-east-1
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "8180"
      ZIPKIN_HOST: zipkin
    ports: ["8082:8080"]
    networks: [retailstore]
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  checkout:
    build:
      context: ../checkout-service
      dockerfile: Dockerfile
    container_name: checkout
    environment:
      SPRING_PROFILES_ACTIVE: local
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RETAIL_CHECKOUT_ENDPOINTS_ORDERS: http://orders:8080
      RETAIL_CHECKOUT_SESSION_TTL_MINUTES: "30"
      RETAIL_CHECKOUT_TAX_RATE: "0.20"
      RETAIL_CHECKOUT_SHIPPING_COST: "5.99"
      RETAIL_CHECKOUT_FREE_SHIPPING_THRESHOLD: "50.00"
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "8180"
      KEYCLOAK_TOKEN_URI: http://keycloak:8180/realms/retailstore/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: checkout-service
      KEYCLOAK_CLIENT_SECRET: checkout-service-secret
      ZIPKIN_HOST: zipkin
    ports: ["8083:8080"]
    networks: [retailstore]
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  orders:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: orders
    environment:
      SPRING_PROFILES_ACTIVE: local
      MYSQL_HOST: mysql
      MYSQL_USER: orders_user
      MYSQL_PASSWORD: orders_pass
      RETAIL_ORDER_MESSAGING_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RETAIL_ORDER_MESSAGING_KAFKA_TOPIC: order-events-dev
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "8180"
      ZIPKIN_HOST: zipkin
    ports: ["8084:8080"]
    networks: [retailstore]
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s


  experience:
    build:
      context: ../experience-service
      dockerfile: Dockerfile
    container_name: experience
    environment:
      SPRING_PROFILES_ACTIVE: local
      RETAIL_EXPERIENCE_ENDPOINTS_CATALOG: http://catalog:8080
      RETAIL_EXPERIENCE_ENDPOINTS_CARTS: http://carts:8080
      RETAIL_EXPERIENCE_ENDPOINTS_ORDERS: http://orders:8080
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "8180"
      KEYCLOAK_TOKEN_URI: http://keycloak:8180/realms/retailstore/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: experience-service
      KEYCLOAK_CLIENT_SECRET: exp-service-secret
      ZIPKIN_HOST: zipkin
    ports: ["8086:8080"]
    networks: [retailstore]
    depends_on:
      catalog:
        condition: service_healthy
      carts:
        condition: service_healthy
      orders:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: gateway
    environment:
      SPRING_PROFILES_ACTIVE: local
      RETAIL_GATEWAY_ROUTES_EXPERIENCE: http://experience:8080
      RETAIL_GATEWAY_ROUTES_CATALOG: http://catalog:8080
      RETAIL_GATEWAY_ROUTES_CARTS: http://carts:8080
      RETAIL_GATEWAY_ROUTES_ORDERS: http://orders:8080
      RETAIL_GATEWAY_ROUTES_CHECKOUT: http://checkout:8080
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "8180"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ALLOWED_ORIGIN: http://localhost:3000
      ZIPKIN_HOST: zipkin
    ports: ["8080:8080"]
    networks: [retailstore]
    depends_on:
      experience:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

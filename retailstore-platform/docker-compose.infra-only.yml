# RetailStore — Infra-only compose
# Use this when ONE service runs in IntelliJ (SPRING_PROFILES_ACTIVE=dev)
# and all other services run in this file or in the full docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.infra-only.yml up
#   then in IntelliJ: VM Args → -Dspring.profiles.active=dev
#
# All ports are forwarded to localhost so IntelliJ services connect via localhost:*

networks:
  retailstore:
    driver: bridge

volumes:
  mysql-data-infra:
  redis-data-infra:
  keycloak-data-infra:

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports: ["3306:3306"]
    volumes:
      - mysql-data-infra:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [retailstore]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports: ["6379:6379"]
    volumes: [redis-data-infra:/data]
    networks: [retailstore]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: dynamodb-local
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports: ["8000:8000"]
    networks: [retailstore]

  dynamodb-init:
    image: amazon/aws-cli:2.17.0
    container_name: dynamodb-init
    depends_on: [dynamodb-local]
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: us-east-1
    command: >
      dynamodb create-table
      --table-name Carts
      --attribute-definitions AttributeName=customerId,AttributeType=S
      --key-schema AttributeName=customerId,KeyType=HASH
      --billing-mode PAY_PER_REQUEST
      --endpoint-url http://dynamodb-local:8000
    networks: [retailstore]

  kafka:
    image: bitnami/kafka:3.8
    container_name: kafka
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT_INTERNAL://:9092,PLAINTEXT_EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:9092,PLAINTEXT_EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "9094:9094"
    networks: [retailstore]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloakdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_pass
    ports: ["8180:8180"]
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - keycloak-data-infra:/opt/keycloak/data
    networks: [retailstore]
    depends_on:
      mysql:
        condition: service_healthy

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports: ["9411:9411"]
    networks: [retailstore]

image:
  repository: ""  # Replace: ECR repo URI
  tag: "latest"
replicaCount: 3
appEnv:
  SPRING_PROFILES_ACTIVE: "prod"
  RETAIL_EXPERIENCE_ENDPOINTS_CATALOG: "http://catalog.retailstore.svc.cluster.local:8080"
  RETAIL_EXPERIENCE_ENDPOINTS_CARTS: "http://carts.retailstore.svc.cluster.local:8080"
  RETAIL_EXPERIENCE_ENDPOINTS_ORDERS: "http://orders.retailstore.svc.cluster.local:8080"
  # Replace: Keycloak JWKS URI (prod Keycloak cluster)
  KEYCLOAK_JWKS_URI: ""
  # Replace: Keycloak token URI (prod Keycloak cluster)
  KEYCLOAK_TOKEN_URI: ""
  KEYCLOAK_CLIENT_ID: "experience-service"
  # KEYCLOAK_CLIENT_SECRET: injected from Kubernetes Secret
  # Replace: prod tracing backend endpoint
  TRACING_ENDPOINT: ""
resources:
  limits:
    memory: 768Mi
  requests:
    cpu: 300m
    memory: 384Mi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 65

image:
  repository: ""  # Replace: ECR repo URI
  tag: "latest"
replicaCount: 3
appEnv:
  SPRING_PROFILES_ACTIVE: "prod"
  # Replace: RDS MySQL Multi-AZ endpoint
  RDS_ENDPOINT: ""
  RDS_PORT: "3306"
  RDS_USER: "orders_user"
  # RDS_PASSWORD: injected from Kubernetes Secret
  RETAIL_ORDER_MESSAGING_ENABLED: "true"
  # Replace: AWS SQS prod queue URL (e.g. https://sqs.us-east-1.amazonaws.com/123456789012/order-events-prod)
  RETAIL_ORDER_MESSAGING_SQS_QUEUE_URL: ""
  SQS_ENDPOINT: ""  # Empty = AWS SDK default endpoint
  AWS_REGION: "us-east-1"
  # Replace: Keycloak JWKS URI (prod Keycloak cluster)
  KEYCLOAK_JWKS_URI: ""
  # Replace: prod tracing backend endpoint
  TRACING_ENDPOINT: ""
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 65

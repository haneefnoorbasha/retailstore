image:
  repository: ""  # Replace: ECR repo URI
  tag: "latest"
replicaCount: 2
appEnv:
  SPRING_PROFILES_ACTIVE: "stage"
  # Replace: ElastiCache primary endpoint
  REDIS_HOST: ""
  REDIS_PORT: "6379"
  RETAIL_CHECKOUT_ENDPOINTS_ORDERS: "http://orders.retailstore.svc.cluster.local:8080"
  RETAIL_CHECKOUT_SESSION_TTL_MINUTES: "30"
  RETAIL_CHECKOUT_TAX_RATE: "0.20"
  RETAIL_CHECKOUT_SHIPPING_COST: "5.99"
  RETAIL_CHECKOUT_FREE_SHIPPING_THRESHOLD: "50.00"
  # Replace: Keycloak JWKS URI on EKS
  KEYCLOAK_JWKS_URI: ""
  # Replace: Keycloak token URI on EKS
  KEYCLOAK_TOKEN_URI: ""
  KEYCLOAK_CLIENT_ID: "checkout-service"
  # KEYCLOAK_CLIENT_SECRET: injected from Kubernetes Secret
  # Replace: tracing backend endpoint
  TRACING_ENDPOINT: "https://zipkin.internal.retailstore.com/api/v2/spans"
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

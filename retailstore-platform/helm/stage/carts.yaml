image:
  repository: ""  # Replace: ECR repo URI
  tag: "latest"
replicaCount: 2
appEnv:
  SPRING_PROFILES_ACTIVE: "stage"
  RETAIL_CART_DYNAMODB_TABLE_NAME: "Carts"
  RETAIL_CART_DYNAMODB_ENDPOINT: ""  # Empty = use AWS SDK default (IAM role via IRSA)
  AWS_REGION: "us-east-1"
  # Replace: Keycloak JWKS URI on EKS
  KEYCLOAK_JWKS_URI: ""
  # Replace: tracing backend endpoint
  TRACING_ENDPOINT: "https://zipkin.internal.retailstore.com/api/v2/spans"
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

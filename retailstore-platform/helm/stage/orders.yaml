image:
  repository: ""  # Replace: ECR repo URI
  tag: "latest"
replicaCount: 2
appEnv:
  SPRING_PROFILES_ACTIVE: "stage"
  # Replace: RDS MySQL endpoint (e.g. stage-orders.xxxxxx.us-east-1.rds.amazonaws.com)
  RDS_ENDPOINT: ""
  RDS_PORT: "3306"
  RDS_USER: "orders_user"
  # RDS_PASSWORD: injected from Kubernetes Secret
  RETAIL_ORDER_MESSAGING_ENABLED: "true"
  # Replace: MSK bootstrap servers (e.g. b-1.xxx.kafka.us-east-1.amazonaws.com:9094)
  KAFKA_BOOTSTRAP_SERVERS: ""
  RETAIL_ORDER_MESSAGING_KAFKA_TOPIC: "order-events-stage"
  # Replace: Keycloak JWKS URI on EKS
  KEYCLOAK_JWKS_URI: ""
  # Replace: tracing backend endpoint
  TRACING_ENDPOINT: "https://zipkin.internal.retailstore.com/api/v2/spans"
resources:
  limits:
    memory: 768Mi
  requests:
    cpu: 200m
    memory: 384Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

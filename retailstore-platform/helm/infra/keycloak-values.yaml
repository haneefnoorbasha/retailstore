# Bitnami Keycloak chart values for k3s dev
# helm install keycloak bitnami/keycloak -n retailstore -f helm/infra/keycloak-values.yaml
#
# NOTE: Realm import is handled post-install via the install-infra.sh script:
#   kubectl create configmap keycloak-realm --from-file=...
#   kubectl exec keycloak-0 -- /opt/bitnami/keycloak/bin/kc.sh import --file /opt/keycloak/data/import/retailstore-realm.json

auth:
  adminUser: admin
  adminPassword: admin

postgresql:
  enabled: false    # Use our MySQL instead

externalDatabase:
  host: mysql
  port: 3306
  database: keycloakdb
  user: keycloak_user
  password: keycloak_pass
  existingSecret: ""

service:
  type: ClusterIP
  ports:
    http: 8180

httpRelativePath: "/"

extraEnvVars:
  - name: KC_HTTP_PORT
    value: "8180"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_DB
    value: "mysql"
  - name: KC_DB_URL
    value: "jdbc:mysql://mysql:3306/keycloakdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  - name: KC_DB_USERNAME
    value: "keycloak_user"
  - name: KC_DB_PASSWORD
    value: "keycloak_pass"

extraArgs: "--import-realm"

extraVolumes:
  - name: realm-config
    configMap:
      name: keycloak-realm

extraVolumeMounts:
  - name: realm-config
    mountPath: /opt/keycloak/data/import

resources:
  limits:
    memory: 768Mi
  requests:
    cpu: 250m
    memory: 512Mi

replicaCount: 1

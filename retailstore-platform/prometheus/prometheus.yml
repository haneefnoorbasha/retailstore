global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8080']

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['catalog:8080']

  - job_name: cart-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['carts:8080']

  - job_name: checkout-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['checkout:8080']

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['orders:8080']

  - job_name: experience-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['experience:8080']

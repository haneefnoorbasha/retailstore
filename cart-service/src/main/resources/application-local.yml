# Local profile — runs on Docker Desktop k8s (local machine).
# Helm injects RETAIL_CART_DYNAMODB_ENDPOINT=http://dynamodb-local:8000, KEYCLOAK_HOST=keycloak
# IntelliJ: port-forward.sh active; ${VAR:localhost} defaults resolve to forwarded ports.

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/retailstore/protocol/openid-connect/certs

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

retail:
  cart:
    dynamodb:
      endpoint: ${RETAIL_CART_DYNAMODB_ENDPOINT:http://localhost:8000}

logging:
  level:
    com.retailstore: DEBUG
